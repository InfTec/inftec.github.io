title: InfTec
description: Public documents for InfTec apps and services.
# jekyll-theme-cayman is one of the GitHub Pages built-in themes,
# so no Gemfile or local Jekyll install is needed for Pages to
# render this. Per-page hero text is overridden via front-matter
# `title:` / `description:` fields on each individual page.
theme: jekyll-theme-cayman
show_downloads: false

# Files in the repo that should NOT become served URLs.
# Setting `exclude` overrides Jekyll's default exclude list, so
# we re-list the defaults (Gemfile etc.) alongside our own
# additions (README.md). Anything listed here is still public on
# github.com (the repo itself is public) but won't appear under
# https://inftec.github.io/.
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - .sass-cache/
  - .jekyll-cache/
